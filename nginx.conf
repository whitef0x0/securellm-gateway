# nginx reverse proxy in front of the SecureLLM Gateway app.
# Required-path role: terminate the public connection, pass requests upstream to
# app:3000, and set the X-Forwarded-* headers Express needs to recover the real
# client IP for the auth-failure rate limiter and audit log.
#
# v1 is HTTP only (TLS termination is a prod concern; the brief evaluators run
# docker-compose up locally over plain HTTP).

worker_processes auto;
events { worker_connections 1024; }

http {
  # Cap upstream body size at the same limit Express enforces (BODY_SIZE_LIMIT).
  client_max_body_size 4m;

  # Don't disclose nginx version in Server: header.
  server_tokens off;

  upstream gateway {
    server app:3000;
    keepalive 16;
  }

  server {
    listen 80 default_server;
    server_name _;

    location / {
      proxy_pass         http://gateway;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
      proxy_read_timeout 60s;
    }
  }
}
