services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      BODY_SIZE_LIMIT: 4mb
      MONGO_URI: mongodb://mongo:27017/securellm
      REDIS_URL: redis://redis:6379
      # Trust the immediate upstream (nginx) hop for X-Forwarded-* headers (arch §7.5).
      TRUST_PROXY: "1"
      # ANTHROPIC_API_KEY is optional — omit and /v1/chat returns 503 (degraded mode)
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # /healthz returns 200 when mongo+redis are reachable (degraded OR healthy);
      # 503 if a datastore dependency is down.
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  mongo_data:
  redis_data:
